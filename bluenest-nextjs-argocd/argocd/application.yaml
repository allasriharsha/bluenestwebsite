
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bluenest
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/allasriharsha/bluenestwebsite.git
    targetRevision: main
    path: bluenest-nextjs-argocd/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
